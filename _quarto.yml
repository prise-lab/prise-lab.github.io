project:
  type: website
  output-dir: docs
  post-render:
    - touch docs/.nojekyll
    - echo 'prise-lab.com' > docs/CNAME

website:
  title: "PRISE Lab"
  description: "Policy Research in Sustainability and Economics — UT Dallas"
  site-url: https://prise-lab.com
  favicon: images/favicon.png
  navbar:
    logo: images/icon.png
    logo-alt: "PRISE Lab"
    background: light
    foreground: "#0e5c5c"
    left:
      - href: index.qmd
        text: Home
      - href: team.qmd
        text: Team
      - href: news.qmd
        text: News
      - href: get-involved.qmd
        text: Get Involved
      - href: links.qmd
        text: Links
    right:
      - href: research.qmd
        text: Research
  page-footer:
    center: "© 2026 PRISE Lab · UT Dallas · School of Economic, Political and Policy Sciences"

format:
  html:
    theme: flatly
    css: styles.css
    toc: false
